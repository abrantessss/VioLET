/**:
  ros__parameters:
    subscribers:
      telemetry:
        battery: "fmu/out/battery_status_v1"
        state: "fmu/out/vehicle_odometry"
        status: "fmu/out/vehicle_status_v2"
      mode:
        response: "fmu/out/vehicle_command_ack_v1"
        
    publishers:
      # Vehicle Telemetry (Status, Battery and State)
      telemetry:
        battery: "fmu/telemetry/battery"
        state: "fmu/telemetry/state"
        status: "fmu/telemetry/status"
      mode:
        request: "fmu/in/vehicle_command"

    services:
      mode:
        arm: "fmu/mode/arm"
        disarm: "fmu/mode/disarm"
        takeoff: "fmu/mode/takeoff"
        orbit: "fmu/mode/orbit"
        land: "fmu/mode/land"
        kill: "fmu/mode/kill"
        